syntax = "proto3";
package clusterpb;
option go_package = "github.com/gritive/GrainFS/internal/cluster/clusterpb";

message Command {
  uint32 type = 1;
  bytes data = 2;
}

message CreateBucketCmd {
  string bucket = 1;
}

message DeleteBucketCmd {
  string bucket = 1;
}

message PutObjectMetaCmd {
  string bucket = 1;
  string key = 2;
  int64 size = 3;
  string content_type = 4;
  string etag = 5;
  int64 mod_time = 6;
}

message DeleteObjectCmd {
  string bucket = 1;
  string key = 2;
}

message CreateMultipartUploadCmd {
  string upload_id = 1;
  string bucket = 2;
  string key = 3;
  string content_type = 4;
  int64 created_at = 5;
}

message CompleteMultipartCmd {
  string bucket = 1;
  string key = 2;
  string upload_id = 3;
  int64 size = 4;
  string content_type = 5;
  string etag = 6;
  int64 mod_time = 7;
}

message AbortMultipartCmd {
  string bucket = 1;
  string key = 2;
  string upload_id = 3;
}

message SetBucketPolicyCmd {
  string bucket = 1;
  bytes policy_json = 2;
}

message DeleteBucketPolicyCmd {
  string bucket = 1;
}

message ObjectMeta {
  string key = 1;
  int64 size = 2;
  string content_type = 3;
  string etag = 4;
  int64 last_modified = 5;
}

message SnapshotState {
  map<string, bytes> entries = 1;
}

message MultipartMeta {
  string content_type = 1;
}

// NodeStatsMsg is broadcast via StreamAdmin every 30s for cluster-wide visibility.
message NodeStatsMsg {
  string node_id = 1;
  double disk_used_pct = 2;
  uint64 disk_avail_bytes = 3;
  double requests_per_sec = 4;
  // joined_at is Unix epoch seconds when this node joined the cluster.
  // Used by the balancer to apply a grace period for newly joined nodes.
  int64 joined_at = 5;
}

// MigrateShardCmd requests movement of a full object copy from src to dst.
message MigrateShardCmd {
  string bucket = 1;
  string key = 2;
  string version_id = 3;
  string src_node = 4;
  string dst_node = 5;
}

// MigrationDoneCmd signals that a migration has completed successfully.
message MigrationDoneCmd {
  string bucket = 1;
  string key = 2;
  string version_id = 3;
  string src_node = 4;
  string dst_node = 5;
}
