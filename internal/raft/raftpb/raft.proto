syntax = "proto3";
package raftpb;
option go_package = "github.com/gritive/GrainFS/internal/raft/raftpb";

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3;
}

message RequestVoteArgs {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteReply {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesArgs {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesReply {
  uint64 term = 1;
  bool success = 2;
}

message InstallSnapshotArgs {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;
}

message InstallSnapshotReply {
  uint64 term = 1;
}

message RPCMessage {
  string type = 1;
  bytes data = 2;
}

message RaftState {
  uint64 term = 1;
  string voted_for = 2;
}

message SnapshotMeta {
  uint64 index = 1;
  uint64 term = 2;
}
