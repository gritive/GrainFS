syntax = "proto3";
package storagepb;
option go_package = "github.com/gritive/GrainFS/internal/storage/storagepb";

message Object {
  string key = 1;
  int64 size = 2;
  string content_type = 3;
  string etag = 4;
  int64 last_modified = 5;
}

message MultipartMeta {
  string upload_id = 1;
  string bucket = 2;
  string key = 3;
  string content_type = 4;
  int64 created_at = 5;
}
